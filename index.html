<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Personal Finance Tracker</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- HEADER -->
    <nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between">
        <h2 class="text-white">
            <i class="fa-solid fa-wallet"></i>
            Personal Finance Tracker
        </h2>
        <button class="btn btn-light" id="themeToggle">
            🌙 Dark Mode
        </button>
    </nav>

    <div class="container py-4">

        <!-- SUMMARY CARDS -->
        <div class="row g-4 mb-4">

            <div class="col-md-4">
                <div class="card summary-card budget-card">
                    <div class="card-body">
                        <h5>Total Budget</h5>
                        <h2 id="budgetAmount">₹0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card summary-card expense-card">
                    <div class="card-body">
                        <h5>Total Expenses</h5>
                        <h2 id="expenseAmount">₹0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card summary-card remaining-card">
                    <div class="card-body">
                        <h5>Remaining Balance</h5>
                        <h2 id="remainingAmount">₹0</h2>
                    </div>
                </div>
            </div>

        </div>

        <!-- BUDGET SECTION -->
        <div class="card mb-4">
            <div class="card-body">

                <h4 class="mb-3">Set Monthly Budget</h4>

                <div class="row g-3">

                    <div class="col-md-8">
                        <input
                            type="number"
                            id="budgetInput"
                            class="form-control"
                            placeholder="Enter monthly budget"
                        />
                    </div>

                    <div class="col-md-4">
                        <button
                            class="btn btn-primary w-100"
                            id="setBudgetBtn"
                        >
                            Set Budget
                        </button>
                    </div>

                </div>

            </div>
        </div>

        <!-- EXPENSE FORM -->
        <div class="card mb-4">
            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h4>Expense List</h4>

                    <button class="btn btn-success" id="exportCSV">
                        Export CSV
                    </button>

                </div>

                <form id="expenseForm">

                    <div class="row g-3">

                        <div class="col-md-3">
                            <input
                                type="text"
                                id="title"
                                class="form-control"
                                placeholder="Expense Title"
                                required
                            />
                        </div>

                        <div class="col-md-2">
                            <input
                                type="number"
                                id="amount"
                                class="form-control"
                                placeholder="Amount"
                                required
                            />
                        </div>

                        <div class="col-md-3">
                            <select
                                id="category"
                                class="form-select"
                                required
                            >
                                <option value="">Select Category</option>
                                <option>Food</option>
                                <option>Travel</option>
                                <option>Shopping</option>
                                <option>Bills</option>
                                <option>Entertainment</option>
                                <option>Others</option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <input
                                type="date"
                                id="date"
                                class="form-control"
                                required
                            />
                        </div>

                        <div class="col-md-2">
                            <button
                                type="submit"
                                class="btn btn-success w-100"
                            >
                                Add
                            </button>
                        </div>

                    </div>

                </form>

            </div>
        </div>

        <!-- SEARCH + FILTER -->
        <div class="row g-3 mb-4">

            <div class="col-md-6">
                <input
                    type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Search expenses..."
                />
            </div>

            <div class="col-md-6">
                <select id="filterCategory" class="form-select">
                    <option value="All">All Categories</option>
                    <option>Food</option>
                    <option>Travel</option>
                    <option>Shopping</option>
                    <option>Bills</option>
                    <option>Entertainment</option>
                    <option>Others</option>
                </select>
            </div>

        </div>

        <!-- EXPENSE TABLE -->
        <div class="card mb-4">
            <div class="card-body">

                <h4 class="mb-3">Expense List</h4>

                <div class="table-responsive">

                    <table class="table table-bordered table-hover">

                        <thead class="table-dark">
                            <tr>
                                <th>Title</th>
                                <th>Amount</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>

                        <tbody id="expenseTableBody">

                        </tbody>

                    </table>

                </div>

            </div>
        </div>

        <!-- CHART SECTION -->
        <div class="card">
            <div class="card-body">

                <h4 class="mb-4">Expense Analytics</h4>

                <canvas id="expenseChart"></canvas>

            </div>
        </div>

    </div>

    <footer class="text-center py-3 mt-4">
        <p>© 2026 Personal Finance Tracker | Kalyan Parida</p>
    </footer>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
